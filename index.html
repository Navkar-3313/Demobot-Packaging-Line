<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maintenance Assistant</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>

/* FULLSCREEN, NO SIDE MARGINS */
body {
  margin: 0;
  padding: 0;
  background: #ece5dd;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* CHAT CONTAINER FILLS ENTIRE SCREEN */
.chat-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #f0f0f0;
}

/* HEADER */
.header {
  background: #2596be;
  color: white;
  padding: 16px;
  font-weight: bold;
  text-align: center;
  font-size: 1.2em;
}

/* MESSAGES AREA */
.messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* CHAT BUBBLES */
.message {
  padding: 12px 16px;
  margin: 6px 0;
  max-width: 85%;
  border-radius: 12px;
  font-size: 1em;
  white-space: pre-line;
  word-wrap: break-word;
}

.user {
  align-self: flex-end;
  background: #9fd8ed;
}

.bot {
  align-self: flex-start;
  background: #ffffff;
}

/* INPUT AREA */
.input-area {
  display: flex;
  padding: 10px;
  background: #f0f0f0;
}

input, select {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
  font-size: 1em;
}

button {
  margin-left: 10px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: #2596be;
  color: white;
  cursor: pointer;
  font-size: 1.3em;
}

/* MOBILE TWEAKS */
@media (max-width: 480px) {
  .message { font-size: 0.95em; }
  .header { font-size: 1.1em; padding: 14px; }
  button { width: 42px; height: 42px; font-size: 1.1em; }
}

</style>
</head>

<body>

<div class="chat-container">

  <div class="header">Maintenance Assistant</div>

  <div class="messages" id="messages">

    <div class="message bot">
      Hi 👋  
      Select a machine from the list below to get started.
    </div>

    <div class="message bot" id="machineSelectBox">
      <strong>Select Machine:</strong><br><br>
      <select id="machineSelect" onchange="machineChosen()">
        <option value="">-- Loading machines... --</option>
      </select>
    </div>

  </div>

  <div class="input-area">
    <input id="userInput" placeholder="Type alarm message..." disabled />
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

<script>

/* SAFE CSV PARSER – handles commas, quotes, long text */
function parseCSV(csvText) {
  const rows = [];
  let row = [];
  let current = "";
  let insideQuotes = false;

  for (let char of csvText) {
    if (char === '"' && !insideQuotes) {
      insideQuotes = true;
    } else if (char === '"' && insideQuotes) {
      insideQuotes = false;
    } else if (char === ',' && !insideQuotes) {
      row.push(current);
      current = "";
    } else if (char === '\n' && !insideQuotes) {
      row.push(current);
      rows.push(row);
      row = [];
      current = "";
    } else {
      current += char;
    }
  }
  if (current.length > 0) row.push(current);
  if (row.length > 0) rows.push(row);

  return rows;
}

let alarms = [];
let machines = new Set();
let selectedMachine = "";

/* LOAD CSV */
fetch("alarms.csv")
  .then(res => res.text())
  .then(text => {
    const rows = parseCSV(text);
    rows.shift(); // remove header row

    rows.forEach(cols => {
      const machine = (cols[0] || "").trim();
      const alarm = (cols[1] || "").trim().toLowerCase();
      const action = (cols[2] || "").trim();

      if (machine) machines.add(machine);

      alarms.push({ machine, alarm, action });
    });

    populateDropdown();
  });

/* FILL MACHINE DROPDOWN */
function populateDropdown() {
  const select = document.getElementById("machineSelect");
  select.innerHTML = `<option value="">-- Select Machine --</option>`;
  machines.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    select.appendChild(opt);
  });
}

/* MACHINE SELECTED */
function machineChosen() {
  const m = document.getElementById("machineSelect").value;
  if (!m) return;

  selectedMachine = m;

  addMessage(`Selected Machine: ${m}`, "user");
  addMessage(`Great! Now tell me the alarm or issue for ${m}.`, "bot");

  document.getElementById("userInput").disabled = false;
}

/* FIND ALARM */
function findAlarm(input) {
  const text = input.toLowerCase();
  const filtered = alarms.filter(a => a.machine === selectedMachine);

  let match =
    filtered.find(a => a.alarm === text) ||
    filtered.find(a => a.alarm.includes(text)) ||
    filtered.find(a => text.includes(a.alarm));

  if (!match) {
    return `❌ No matching alarm found for ${selectedMachine}.\n\nTry:\n• Using keywords\n• Shorter phrases\n• Correct spelling`;
  }

  return `✅ Alarm Found for ${selectedMachine}

🔹 Issue:
${match.alarm}

🔧 Recommended Action:
${match.action}

⚠️ Ensure safety procedures before inspection.`;
}

/* SEND MESSAGE */
function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = findAlarm(text);
    addMessage(reply, "bot");
  }, 400);
}

/* ADD MESSAGE TO CHAT */
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = `message ${sender}`;
  msg.innerText = text;
  document.getElementById("messages").appendChild(msg);
  msg.scrollIntoView();
}

</script>

</body>
</html>
